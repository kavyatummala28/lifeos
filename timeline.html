<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Timeline - LifeOS</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .timeline-container {
            max-width: 900px;
            margin: 0 auto;
            padding-left: 2rem;
            border-left: 2px solid var(--glass-border);
            position: relative;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 3rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: calc(-2rem - 11px);
            top: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            border: 4px solid var(--bg-dark);
        }

        .light-mode .timeline-item::before {
            border-color: var(--bg-light);
        }

        .item-date {
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0.5;
            margin-bottom: 0.5rem;
            display: block;
        }

        .timeline-content {
            padding: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="logo"><i class="ri-pulse-fill"></i><span>LifeOS</span></div>
            <nav class="nav-links">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="ri-dashboard-3-line"></i><span
                            class="nav-text">Dashboard</span></a></li>
                <li class="nav-item"><a href="decision.html" class="nav-link"><i class="ri-git-branch-line"></i><span
                            class="nav-text">Decision Builder</span></a></li>
                <li class="nav-item"><a href="simulator.html" class="nav-link"><i class="ri-magic-line"></i><span
                            class="nav-text">Simulator</span></a></li>
                <li class="nav-item"><a href="analyzer.html" class="nav-link"><i class="ri-cpu-line"></i><span
                            class="nav-text">Bias Analyzer</span></a></li>
                <li class="nav-item"><a href="timeline.html" class="nav-link active"><i
                            class="ri-history-line"></i><span class="nav-text">Insight Timeline</span></a></li>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header animate-in">
                <div class="header-info">
                    <h1>Insight Timeline</h1>
                    <p>Track your analytical evolution over time.</p>
                </div>
            </header>

            <div id="timeline-list" class="timeline-container animate-in" style="animation-delay: 0.1s">
                <!-- Dynamic Items -->
                <div class="empty-state glass-panel">
                    <i class="ri-history-line"></i>
                    <p>No decision history found. Your journey begins with your first structured choice.</p>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/timeline.js"></script>
</body>

</html>
